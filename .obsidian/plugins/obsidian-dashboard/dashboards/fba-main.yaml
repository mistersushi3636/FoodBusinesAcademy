## 🚀 FBA WORKSPACE — Main Dashboard

### 📊 PROJECT METRICS
```
```dataview
TABLE WITHOUT ID
  "📊 Всего задач" as "Метрика",
  "86" as "Значение"
FROM "LAUNCH-CHECKLIST"
LIMIT 1
```
```

### ✅ CHECKLIST STATUS
```
```dataview
TABLE WITHOUT ID
  "Завершено" as "Статус",
  file.name as "Источник"
FROM "LAUNCH-CHECKLIST"
WHERE sync = true
```
```

### 👥 AGENT ASSIGNMENTS
```
```dataview
TABLE agent, COUNT as "Задач"
FROM "LAUNCH-CHECKLIST"
GROUP BY agent
SORT COUNT DESC
```
```

### 📱 PLATFORM STATUS
```
```dataview
TABLE
  platform as "Платформа",
  status as "Статус",
  rhythm as "Ритм"
FROM "platforms"
SORT platform ASC
```
```

### 📅 WEEKLY BREAKDOWN
```
```dataview
TABLE
  week as "Неделя",
  COUNT as "Задач"
FROM "LAUNCH-CHECKLIST"
GROUP BY week
SORT week ASC
```
```

### 🎯 PRIORITY DISTRIBUTION
```
```dataview
TABLE
  priority as "Приоритет",
  COUNT as "Задач"
FROM "LAUNCH-CHECKLIST"
GROUP BY priority
SORT priority DESC
```
```

