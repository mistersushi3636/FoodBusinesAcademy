{% extends "base.html" %}
{% block title %}Новый проект{% endblock %}
{% block content %}
<style>
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:480px}
  .back{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;margin-bottom:24px}
  .title{font-size:20px;font-weight:700;margin-bottom:4px}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
<div class="wrap">
  <div class="box">
    <a href="/" class="back">← Все проекты</a>
    <div class="title">Новый проект</div>
    <div class="subtitle">Заполни основную информацию</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group">
        <label>Название *</label>
        <input name="name" placeholder="Food Business Academy 2.0" required
               oninput="autoSlug(this)">
      </div>
      <div class="form-group">
        <label>Slug (URL) *</label>
        <input name="slug" id="slug" placeholder="fba-2-0" required pattern="[a-z0-9\-]+">
        <span class="hint">Только латинские буквы, цифры и дефис</span>
      </div>
      <div class="form-group">
        <label>Описание</label>
        <input name="description" placeholder="Короткое описание проекта">
      </div>
      <div class="row">
        <div class="form-group">
          <label>Пароль *</label>
          <input type="password" name="password" required minlength="6" placeholder="••••••">
        </div>
        <div class="form-group">
          <label>Повтор *</label>
          <input type="password" name="confirm" required placeholder="••••••">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:4px">Создать проект</button>
    </form>
  </div>
</div>
<script>
function autoSlug(inp){
  const s=inp.value.toLowerCase()
    .replace(/[^a-zа-я0-9\s-]/g,'')
    .replace(/[а-я]/g,c=>({а:'a',б:'b',в:'v',г:'g',д:'d',е:'e',ё:'yo',ж:'zh',з:'z',и:'i',й:'j',к:'k',л:'l',м:'m',н:'n',о:'o',п:'p',р:'r',с:'s',т:'t',у:'u',ф:'f',х:'h',ц:'ts',ч:'ch',ш:'sh',щ:'shch',ъ:'',ы:'y',ь:'',э:'e',ю:'yu',я:'ya'}[c]||c))
    .replace(/\s+/g,'-').replace(/-+/g,'-');
  document.getElementById('slug').value=s;
}
</script>
{% endblock %}
