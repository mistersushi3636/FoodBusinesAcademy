{% extends "base.html" %}
{% block title %}Вход — {{ project.name }}{% endblock %}
{% block content %}
<style>
  .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .box{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px;width:100%;max-width:380px}
  .back{font-size:12px;color:var(--muted);display:inline-flex;align-items:center;gap:4px;margin-bottom:24px}
  .title{font-size:20px;font-weight:700;margin-bottom:4px}
  .subtitle{color:var(--muted);font-size:13px;margin-bottom:24px}
</style>
<div class="wrap">
  <div class="box">
    <a href="/" class="back">← Все проекты</a>
    <div class="title">{{ project.name }}</div>
    <div class="subtitle">Введи пароль для входа</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="post">
      <div class="form-group">
        <label>Пароль</label>
        <input type="password" name="password" autofocus placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Войти</button>
    </form>
  </div>
</div>
{% endblock %}
