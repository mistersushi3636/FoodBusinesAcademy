<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FBA Dashboard{% endblock %}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1117;--surface:#1a1d27;--s2:#1e2130;--border:#2a2d3e;
      --text:#e2e8f0;--muted:#64748b;--accent:#6366f1;
      --green:#22c55e;--yellow:#eab308;--red:#ef4444;
      --blue:#3b82f6;--orange:#f97316;--purple:#a78bfa;
    }
    body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.6}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    input,textarea,select{background:var(--s2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;width:100%;outline:none;font-family:inherit}
    input:focus,textarea:focus,select:focus{border-color:var(--accent)}
    textarea{resize:vertical;min-height:80px}
    .btn{display:inline-block;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:#5254d4}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
    .btn-ghost:hover{color:var(--text);border-color:var(--muted)}
    .btn-danger{background:#3a1a1a;color:var(--red);border:1px solid #5a2a2a}
    .btn-sm{padding:4px 10px;font-size:12px}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
    .badge-green{background:#14302a;color:var(--green)}
    .badge-blue{background:#1e2a3e;color:var(--blue)}
    .badge-yellow{background:#2d2200;color:var(--yellow)}
    .badge-red{background:#3a1a1a;color:var(--red)}
    .badge-purple{background:#2d1f5e;color:var(--purple)}
    .badge-gray{background:#1e293b;color:var(--muted)}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
    .card h2{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:12px}
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .form-group label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
    .error{background:#3a1010;border:1px solid #7a2020;color:#fca5a5;padding:10px 14px;border-radius:6px;font-size:13px;margin-bottom:14px}
    .empty{color:var(--muted);font-size:13px;padding:20px 0;text-align:center}
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
