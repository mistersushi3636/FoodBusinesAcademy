# /etc/nginx/sites-available/findir.mistersushi36.pro
# После установки: ln -s /etc/nginx/sites-available/findir.mistersushi36.pro /etc/nginx/sites-enabled/
#                  certbot --nginx -d findir.mistersushi36.pro
#                  systemctl reload nginx

server {
    listen 80;
    server_name findir.mistersushi36.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name findir.mistersushi36.pro;

    ssl_certificate     /etc/letsencrypt/live/findir.mistersushi36.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/findir.mistersushi36.pro/privkey.pem;

    client_max_body_size 10m;

    access_log /var/log/nginx/findir-access.log;
    error_log  /var/log/nginx/findir-error.log;

    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
